<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Temperature Converter</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="logo">🌡️ TempConvert</div>
    <p class="tagline">Celsius · Fahrenheit · Kelvin</p>
  </header>

  <main>
    <div class="card">

      <div class="input-group">
        <label for="tempInput">Enter Temperature</label>
        <input type="number" id="tempInput" placeholder="e.g. 100" />
        <span class="error" id="errorMsg">⚠ Please enter a valid number!</span>
      </div>

      <div class="unit-group">
        <label>Convert From</label>
        <div class="radio-buttons">
          <label class="radio-option">
            <input type="radio" name="unit" value="celsius" checked/>
            <span>Celsius&nbsp;&nbsp;</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="unit" value="fahrenheit"/>
            <span>Fahrenheit</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="unit" value="kelvin"/>
            <span>Kelvin</span>
          </label>
        </div>
      </div>

      <button id="convertBtn">Convert</button>

      <div class="result-box" id="resultBox">
        <div class="result-item" id="res1"></div>
        <div class="result-item" id="res2"></div>
      </div>

    </div>
  </main>

  <footer>
    <p>Made with ❤️ by Kinjal Prabhakar &nbsp;&nbsp;</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
